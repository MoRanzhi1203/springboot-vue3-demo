# ==================== Spring Boot 基础配置 ====================
spring:
  application:
    name: springboot-demo-backend

  # ==================== SQL 初始化配置 ====================
  sql:
    init:
      mode: always
      schema-locations: classpath:db/init.sql
      continue-on-error: true

  # ==================== 数据库配置 ====================
  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/tanku?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: 123456

    # ==================== Druid 连接池配置 ====================
    druid:
      # 初始化连接数
      initial-size: 5
      # 最小空闲连接数
      min-idle: 5
      # 最大活跃连接数
      max-active: 20
      # 获取连接超时时间（毫秒）
      max-wait: 60000
      # 检测空闲连接的间隔时间（毫秒）
      time-between-eviction-runs-millis: 60000
      # 连接的最小生存时间（毫秒）
      min-evictable-idle-time-millis: 300000
      # 验证连接是否有效的 SQL
      validation-query: SELECT 1
      # 空闲时检测连接有效性
      test-while-idle: true
      # 申请连接时检测
      test-on-borrow: false
      # 归还连接时检测
      test-on-return: false
      # 是否缓存 PreparedStatement（MySQL 建议关闭）
      pool-prepared-statements: false
      # 过滤器
      filters: stat,wall

      # Druid 监控配置
      stat-view-servlet:
        enabled: true
        url-pattern: /druid/*
        login-username: admin
        login-password: admin
        reset-enable: false

      web-stat-filter:
        enabled: true
        url-pattern: /*
        exclusions: "*.js,*.gif,*.jpg,*.png,*.css,*.ico,/druid/*"

# ==================== MyBatis-Plus 配置 ====================
mybatis-plus:
  # 实体类包路径（用于别名）
  type-aliases-package: com.example.springbootdemobackend.entity
  # Mapper XML 文件路径
  mapper-locations: classpath:mapper/**/*.xml
  configuration:
    # 控制台打印 SQL 日志
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    # 开启驼峰命名自动映射
    map-underscore-to-camel-case: true
    # 开启二级缓存
    cache-enabled: false
  global-config:
    db-config:
      # 主键类型：ASSIGN_ID = 雪花算法
      id-type: assign_id
      # 逻辑删除字段名
      logic-delete-field: deleted
      # 逻辑删除值（1=已删除）
      logic-delete-value: 1
      # 逻辑未删除值（0=未删除）
      logic-not-delete-value: 0

# ==================== 服务端口 ====================
server:
  port: 8080
